name: Publish Docker images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - task-13-docker-compose
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/publish-images.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            image: ghcr.io/mackarovak/hospital_service-backend
          - name: frontend
            context: ./frontend
            image: ghcr.io/mackarovak/hospital_service-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/mackarovak/hospital_service
