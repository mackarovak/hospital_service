services:
  db:
    image: postgres:16
    container_name: medcat_db
    environment:
      POSTGRES_DB: medcat
      POSTGRES_USER: medcat
      POSTGRES_PASSWORD: medcat_password
    ports:
      - "5432:5432"
    volumes:
      - medcat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcat -d medcat"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: medcat_backend
    environment:
      DATABASE_ENGINE: postgres
      POSTGRES_DB: medcat
      POSTGRES_USER: medcat
      POSTGRES_PASSWORD: medcat_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: dev-only-compose-secret-key-change-before-deploying
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: change_me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: medcat_frontend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  medcat_postgres_data:
