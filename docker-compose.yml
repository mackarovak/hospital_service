services:
  db:
    image: postgres:16
    container_name: medcat_db
    environment:
      POSTGRES_DB: medcat
      POSTGRES_USER: medcat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medcat_password}
    volumes:
      - medcat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcat -d medcat"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: medcat_backend
    environment:
      DATABASE_ENGINE: postgres
      POSTGRES_DB: medcat
      POSTGRES_USER: medcat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medcat_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-compose-secret-key-change-before-deploying}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,${PUBLIC_HOST:-144.124.240.63}
      FRONTEND_URL: http://${PUBLIC_HOST:-144.124.240.63}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: medcat_frontend
    environment:
      VITE_API_URL: http://${PUBLIC_HOST:-144.124.240.63}:8000/api/v1
    ports:
      - "80:5173"
    depends_on:
      - backend

  loki:
    image: grafana/loki:2.9.8
    container_name: medcat_loki
    command: -config.file=/etc/loki/local-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yml:ro
      - medcat_loki_data:/loki

  promtail:
    image: grafana/promtail:2.9.8
    container_name: medcat_promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.12
    container_name: medcat_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - medcat_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki

volumes:
  medcat_postgres_data:
  medcat_loki_data:
  medcat_grafana_data:
