apiVersion: apps/v1
kind: Deployment
metadata:
  name: medcat-backend
  labels:
    app: medcat-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medcat-backend
  template:
    metadata:
      labels:
        app: medcat-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/mackarovak/hospital_service-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: medcat-config
            - secretRef:
                name: medcat-secret
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          command:
            - sh
            - -c
          args:
            - >
              until python manage.py migrate; do
              echo "waiting for database";
              sleep 3;
              done;
              python scripts/seed.py;
              python manage.py runserver 0.0.0.0:8000
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: medcat-backend
spec:
  selector:
    app: medcat-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
